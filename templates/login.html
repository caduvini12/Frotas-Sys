<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login — Frota/SYS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #0c0c0c;
            --bg2:    #141414;
            --bg3:    #1a1a1a;
            --border: #2a2a2a;
            --accent: #F5A623;
            --text:   #f0ede8;
            --text2:  #7a7570;
            --danger: #ff4455;
            --radius: 6px;
            --mono:   'Space Mono', monospace;
            --sans:   'DM Sans', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 360px;
            padding: 24px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            margin: 0 auto 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .login-title {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .login-title span { color: var(--text2); font-weight: 400; }

        .login-sub {
            font-size: 12px;
            color: var(--text2);
            margin-top: 6px;
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            padding: 10px 12px;
            transition: border-color 0.15s;
            outline: none;
        }

        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text2); }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: #0c0c0c;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 11px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn-login:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .flash-error {
            background: rgba(255,68,85,0.08);
            border: 1px solid rgba(255,68,85,0.3);
            border-left: 3px solid #ff4455;
            color: #ff4455;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: var(--radius);
            margin-bottom: 16px;
        }

        .login-footer {
            text-align: center;
            font-size: 11px;
            color: var(--text2);
            margin-top: 20px;
            font-family: var(--mono);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-brand">
        <div class="login-dot"></div>
        <div class="login-title">FROTA<span>/SYS</span></div>
        <div class="login-sub">Ative Engenharia — Gestão de Frota</div>
    </div>

    <div class="login-card">
        {% if erro %}
        <div class="flash-error">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/login" autocomplete="off">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input
                    class="form-input"
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Digite seu usuário"
                    required
                    autofocus
                    maxlength="50"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Digite sua senha"
                    required
                    maxlength="100"
                >
            </div>

            <button class="btn-login" type="submit">ENTRAR</button>
        </form>
    </div>

    <div class="login-footer">ACESSO RESTRITO — ATIVE ENGENHARIA</div>
</div>
</body>
</html>
